<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Quick Redirect</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene 
        mindar-image="imageTargetSrc: https://asueducation1-ops.github.io/AR-card/targets.mind; autoStart: true; uiScanning: yes;" 
        embedded color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target0" mindar-image-target="targetIndex: 0">
            <a-ring color="teal" radius-inner="0.5" radius-outer="0.6" rotation="0 0 0"></a-ring>
        </a-entity>
    </a-scene>

    <script>
        const targetEl = document.querySelector('#target0');

        // 画像を見つけた瞬間に指定のURLへ飛ばす
        targetEl.addEventListener("targetFound", () => {
            console.log("Found!");
            window.location.href = 'https://asueducation1-ops.github.io/AR-card/';
        });

        // エラーログ（もし読み込めない場合はアラートを出します）
        document.querySelector('a-scene').addEventListener("arError", (event) => {
            alert("カメラまたはファイルの読み込みに失敗しました。");
        });
    </script>
</body>
</html>
