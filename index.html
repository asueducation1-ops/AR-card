<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Debug Mode</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #status-log {
        position: fixed; top: 10px; left: 10px; padding: 10px;
        background: rgba(0,0,0,0.8); color: #0f0; z-index: 1000;
        font-family: monospace; font-size: 12px; pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="status-log">Status: Initializing...</div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-camera position="0 0 0" look-controls="enabled: false" raycaster="objects: .clickable" cursor="fuse: false; rayOrigin: mouse;"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <a-box position="0 0 0" scale="0.5 0.5 0.5" color="red" class="clickable"></a-box>
      </a-entity>
    </a-scene>

    <script>
      const log = document.getElementById('status-log');
      const sceneEl = document.querySelector('a-scene');

      // 1. MindARの準備が完了したか
      sceneEl.addEventListener("arReady", () => {
        log.innerText = "Status: AR Ready (Camera Active)";
      });

      // 2. エラーが発生したか
      sceneEl.addEventListener("arError", (e) => {
        log.style.color = "red";
        log.innerText = "Status: AR Error! (Check HTTPS/Camera)";
      });

      // 3. 画像を認識したか
      const targetEl = document.querySelector('#target');
      targetEl.addEventListener("targetFound", () => {
        log.style.color = "yellow";
        log.innerText = "Status: TARGET FOUND! Redirecting...";
        // 認識したらすぐにURLへ飛ばす設定
        setTimeout(() => {
            window.location.href = 'https://asueducation1-ops.github.io/AR-card/';
        }, 1000); // 1秒後に遷移
      });

      targetEl.addEventListener("targetLost", () => {
        log.style.color = "#0f0";
        log.innerText = "Status: Target Lost (Searching...)";
      });
    </script>
  </body>
</html>
