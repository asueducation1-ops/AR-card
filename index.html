<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Marker to URL</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #scanning-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.6); color: white;
        display: flex; align-items: center; justify-content: center;
        z-index: 999; font-family: sans-serif;
      }
      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <div id="scanning-overlay">指定の画像にかざしてください...</div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: #scanning-overlay;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="avatarModel" src="./hoshinoAR0221.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false" raycaster="objects: .clickable" cursor="fuse: false; rayOrigin: mouse;"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model 
          src="#avatarModel" 
          rotation="90 0 0" 
          position="0 0 0.1" 
          scale="1 1 1">
        </a-gltf-model>

        <a-plane 
          id="link-button"
          class="clickable"
          position="0 -0.6 0.2" 
          width="0.8" height="0.3" 
          color="#007bff"
          text="value: CLICK FOR WEB; align: center; width: 2; color: white;">
        </a-plane>
      </a-entity>
    </a-scene>

    <script>
      const button = document.querySelector('#link-button');
      const overlay = document.querySelector('#scanning-overlay');
      const sceneEl = document.querySelector('a-scene');

      // 画像を認識した時の処理
      sceneEl.addEventListener("targetFound", () => {
        overlay.classList.add("hidden");
      });

      // ボタンがクリック（タップ）された時の処理
      button.addEventListener('click', () => {
        // ここに飛ばしたいURLを記入してください
        window.location.href = 'https://www.google.com'; 
      });
    </script>
  </body>
</html>
