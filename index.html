<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Card Link</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>

    <style>
      body { margin: 0; overflow: hidden; }
      /* スキャン中の案内 */
      #scanning-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.7); color: white;
        display: flex; align-items: center; justify-content: center;
        z-index: 999; font-family: sans-serif; font-size: 1.2em;
      }
      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <div id="scanning-overlay">画像をカメラにかざしてください...</div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: #scanning-overlay;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="avatarModel" src="./hoshinoAR0221.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false" raycaster="objects: .clickable" cursor="fuse: false; rayOrigin: mouse;"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        
        <a-gltf-model 
          src="#avatarModel" 
          rotation="90 0 0" 
          position="0 0 0.1" 
          scale="1 1 1"
          animation-mixer>
        </a-gltf-model>

        <a-plane 
          id="link-button"
          class="clickable"
          position="0 -0.7 0.2" 
          width="1.2" height="0.4" 
          color="#007bff"
          text="value: CLICK FOR WEB; align: center; width: 3; color: white;">
        </a-plane>

      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const overlay = document.querySelector('#scanning-overlay');
      const button = document.querySelector('#link-button');

      // 画像を認識した時の処理
      sceneEl.addEventListener("targetFound", () => {
        overlay.classList.add("hidden");
        console.log("Target Found!");
      });

      // 画像を見失った時の処理
      sceneEl.addEventListener("targetLost", () => {
        overlay.classList.remove("hidden");
      });

      // ボタンをタップした時の処理
      button.addEventListener('click', () => {
        window.location.href = 'https://asueducation1-ops.github.io/AR-card/';
      });
    </script>
  </body>
</html>
