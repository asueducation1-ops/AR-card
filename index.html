<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant AR Card</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>

    <style>
      body { margin: 0; overflow: hidden; }
      #scanning-overlay {
        display: flex; align-items: center; justify-content: center;
        position: fixed; left: 0; right: 0; top: 0; bottom: 0;
        background: rgba(0,0,0,0.7); color: white; z-index: 999;
        font-family: sans-serif;
      }
      /* 認識した時にオーバーレイを隠すクラス */
      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <div id="scanning-overlay">画像をカメラにかざしてください...</div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; uiScanning: #scanning-overlay; filterMinCF:0.0001; filterBeta: 0.001;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="avatarModel" src="./hoshinoAR0221.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="far: ${customFields.lib7}; objects: .clickable"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <a-gltf-model 
          id="ar-model"
          rotation="90 0 0" 
          position="0 0 0.1" 
          scale="1 1 1" 
          src="#avatarModel" 
          animation-mixer>
        </a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const overlay = document.querySelector('#scanning-overlay');

      // ターゲットが見つかった時の処理
      sceneEl.addEventListener("targetFound", event => {
        console.log("ターゲットを認識しました");
        overlay.classList.add("hidden");
      });

      // ターゲットを見失った時の処理
      sceneEl.addEventListener("targetLost", event => {
        console.log("ターゲットを見失いました");
        overlay.classList.remove("hidden");
      });
    </script>
  </body>
</html>
